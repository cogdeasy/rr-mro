name: Deploy — Main Branch

on:
  push:
    branches: [main, master, 'devin/1776997567-init-mro-platform']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # Build & validate before deploy
  # ──────────────────────────────────────────────
  build:
    name: Build Artefacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Frontend ──
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend (production)
        run: npx ng build --configuration production --no-progress
        working-directory: frontend

      # ── Backend ──
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build backend (Release)
        run: dotnet build --configuration Release --no-restore
        working-directory: backend

      - name: Publish backend
        run: dotnet publish --configuration Release --no-build --output ./publish
        working-directory: backend

      # ── Upload artefacts ──
      - name: Upload frontend artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser/
          retention-days: 7

      - name: Upload backend artefact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: backend/publish/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Deploy (placeholder — wire up to Azure, Vercel, etc.)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download frontend artefact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Download backend artefact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: backend-publish

      - name: Deploy (placeholder)
        run: |
          echo "=========================================="
          echo " Deploy step placeholder"
          echo " Wire up Azure App Service, Azure Static"
          echo " Web Apps, or your preferred hosting."
          echo "=========================================="
          echo ""
          echo "Frontend artefact:"
          ls -lh frontend-dist/ 2>/dev/null || echo "  (empty — check build)"
          echo ""
          echo "Backend artefact:"
          ls -lh backend-publish/ 2>/dev/null || echo "  (empty — check build)"
