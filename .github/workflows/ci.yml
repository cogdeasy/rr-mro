name: CI — PR Checks

on:
  pull_request:
    branches: ['*']
  push:
    branches: ['*']
    # deploy.yml handles main separately; this workflow validates every push
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Frontend: lint, typecheck, build, test
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (Angular compiler)
        run: npx ng build --configuration production --no-progress 2>&1 | head -200
        # Angular's AOT compiler performs full type-checking during build

      - name: Unit tests
        run: npx ng test --watch=false --browsers=ChromeHeadless --no-progress

  # ──────────────────────────────────────────────
  # Backend: build, test
  # ──────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore --warnaserrors

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal 2>&1 || echo "No test projects found — skipping"
